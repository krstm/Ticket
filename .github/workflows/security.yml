name: "Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Manuel tetikleme özelliği
  schedule:
    - cron: '30 0 * * 0' # Her pazar gece 00:30'da otomatik tarama

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # write implies read for the API

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. CodeQL Başlatma (Derlemeden ÖNCE gelmek zorundadır)
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'csharp, javascript'
        queries: security-extended,security-and-quality

    # 2. Frontend Build
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Build Frontend
      working-directory: ./Ticket
      run: |
        npm ci
        npm run lint
        npm run check:audit
        npm run build

    # 3. .NET Build (CodeQL izleyicisi aktifken derleme yapılmalı)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: .NET Restore & Build
      run: |
        dotnet restore
        dotnet build --configuration Release --no-incremental

    # 4. CodeQL Analizi
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Build Frontend
      working-directory: ./Ticket
      run: |
        npm ci
        npm run build

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Start Application
      working-directory: ./Ticket
      env:
        ASPNETCORE_ENVIRONMENT: Playwright
      run: |
        dotnet run --configuration Release --urls http://127.0.0.1:5080 &
        echo $! > zap-app.pid
        sleep 10

    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        target: 'http://127.0.0.1:5080/ui'
        cmd: '-m 2'
        report_html: true
        artifact_name: zap-baseline-report
        allow_issue_writing: false

    - name: Stop Application
      if: always()
      run: |
        if [ -f Ticket/zap-app.pid ]; then
          kill $(cat Ticket/zap-app.pid) || true
        fi
