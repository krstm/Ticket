name: "Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'csharp, javascript'
        queries: security-extended,security-and-quality

    - name: Build Frontend & Backend
      working-directory: ./Ticket
      run: |
        npm ci
        npm run build
        dotnet restore ../Ticket.sln
        dotnet build ../Ticket.sln --configuration Release --no-restore

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  zap-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build Application
      run: |
        cd Ticket
        npm ci
        npm run build
        dotnet build --configuration Release

    - name: Start Application (Port 5199)
      working-directory: ./Ticket
      env:
        ASPNETCORE_ENVIRONMENT: Playwright
        Database__Provider: InMemory
      run: |
        dotnet run --configuration Release --no-build --urls http://127.0.0.1:5199 &
        echo $! > zap-app.pid
        sleep 10

    - name: Wait for App
      run: |
        for i in {1..20}; do
          if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5199/ | grep -qE "200|302|404"; then
            echo "App is ready!"
            exit 0
          fi
          sleep 3
        done
        exit 1

    - name: Run ZAP Scan (Docker)
      run: |
        chmod -R 777 .
        docker run --network=host -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
          -t http://127.0.0.1:5199/ \
          -J report_json.json -w report_md.md -r report_html.html -m 2 || true

    - name: Stop Application
      if: always()
      run: |
        if [ -f Ticket/zap-app.pid ]; then
          kill $(cat Ticket/zap-app.pid) || true
          sleep 2
        fi

    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-security-report
        path: |
          report_html.html
          report_md.md
          report_json.json
