name: "Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'csharp, javascript'
        queries: security-extended,security-and-quality

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: Ticket/package-lock.json

    - name: Build Frontend
      working-directory: ./Ticket
      run: |
        npm ci
        npm run lint
        npm run check:audit
        npm run build

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: .NET Restore & Build
      run: |
        dotnet restore Ticket.sln
        dotnet build Ticket.sln --configuration Release --no-incremental --no-restore

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: Ticket/package-lock.json

    - name: Build Frontend
      working-directory: ./Ticket
      run: |
        npm ci
        npm run lint
        npm run check:audit
        npm run build

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore & Build backend
      run: |
        dotnet restore Ticket/Ticket.csproj
        dotnet build Ticket/Ticket.csproj --configuration Release --no-restore

    - name: Start Application
      working-directory: ./Ticket
      env:
        ASPNETCORE_ENVIRONMENT: Playwright
        PLAYWRIGHT_HOST: 127.0.0.1
        PLAYWRIGHT_PORT: 5199
        PLAYWRIGHT_BASE_URL: http://127.0.0.1:5199
        Database__Provider: InMemory
      run: |
        dotnet run --configuration Release --no-build --urls http://127.0.0.1:5199 &
        echo $! > zap-app.pid
        sleep 5

    - name: Wait for application readiness
      run: |
        for i in {1..30}; do
          if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5199/ | grep -qE "200|302|404"; then
            echo "Application is up!"
            exit 0
          fi
          echo "Waiting for app on 5199... ($i)"
          sleep 2
        done
        echo "Application failed to start." >&2
        exit 1

    - name: Make workspace writable for ZAP
      run: sudo chmod -R 777 "$GITHUB_WORKSPACE"

    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://127.0.0.1:5199/'
        cmd_options: '-m 2'
        artifact_name: zapreport
        allow_issue_writing: false

    - name: Stop Application
      if: always()
      run: |
        if [ -f Ticket/zap-app.pid ]; then
          kill $(cat Ticket/zap-app.pid) || true
        fi
