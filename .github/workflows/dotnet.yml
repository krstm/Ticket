name: .NET Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Node.js Kurulumu (Tailwind v4 ve Vite 7 için gerekli)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    # 2. Frontend Build
    - name: Install NPM dependencies & Build Frontend
      working-directory: ./Ticket
      run: |
        npm ci
        npm run lint
        npm run check:audit
        npm run build

    # 3. .NET Build
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore Ticket.sln

    - name: Build
      run: dotnet build Ticket.sln --no-restore --configuration Release

    # 4. Playwright Security Smoke Tests
    - name: Run Playwright tests
      working-directory: ./Ticket
      env:
        ASPNETCORE_ENVIRONMENT: Playwright
        PLAYWRIGHT_HOST: 127.0.0.1
        PLAYWRIGHT_PORT: 5178
      run: |
        npx playwright install --with-deps chromium
        npm run test:e2e -- --reporter=line

    # 5. Domain & Security Unit/Integration Tests
    - name: Test
      run: dotnet test Ticket.sln --no-build --verbosity normal --configuration Release
